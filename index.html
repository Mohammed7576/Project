<!doctype html>
<html lang="en" style="background: #000022; color: #10b981;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prometheus AI - SQLi Evolution v2</title>
    <style>
      body { background: #000022; margin: 0; padding: 0; color: #10b981; font-family: monospace; }
      @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; background: #050505; color: #10b981; font-family: monospace;">
        <div style="border: 2px solid #10b981; padding: 20px; border-radius: 8px; animation: pulse 2s infinite;">
          [ جاري تحميل النظام... ]
        </div>
        <div style="font-size: 10px; opacity: 0.5;">
          INITIALIZING CYBER-CORE v0.0.1
        </div>
        <div id="debug-info" style="font-size: 10px; color: #444; margin-top: 20px; max-width: 80%; text-align: center;">
          Waiting for JavaScript to initialize...
        </div>
        <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true);" style="margin-top: 20px; background: #10b981; color: black; border: none; padding: 5px 10px; font-size: 10px; cursor: pointer; font-family: monospace;">
          [ FORCE CACHE CLEAR & RELOAD ]
        </button>
      </div>
    </div>
    <script>
      (function() {
        console.log("[INDEX] Bootstrapping system...");
        var debugInfo = document.getElementById('debug-info');
        function updateStatus(msg) {
          console.log("[STATUS]", msg);
          if (debugInfo) debugInfo.innerText = msg;
        }
        
        updateStatus("HTML Loaded, monitoring for errors...");

        window.onerror = function(msg, url, line, col, error) {
          var errorMsg = "[GLOBAL ERROR] " + msg + " at " + url + ":" + line;
          console.error(errorMsg);
          updateStatus("CRITICAL ERROR: " + msg);
          
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div style="color: #ff4444; padding: 40px; background: #1a0000; font-family: monospace; min-height: 100vh; box-sizing: border-box; border: 4px solid #ff0000; overflow: auto;">' +
              '<h1 style="margin-top: 0; font-size: 24px;">CRITICAL SYSTEM FAILURE</h1>' +
              '<div style="background: #000; padding: 20px; border: 1px solid #ff4444; margin-bottom: 20px;">' +
              '<p><strong>Message:</strong> ' + msg + '</p>' +
              '<p><strong>Location:</strong> ' + url + ':' + line + ':' + col + '</p>' +
              (error && error.stack ? '<details style="margin-top: 10px;"><summary>Stack Trace</summary><pre style="font-size: 10px; opacity: 0.7; white-space: pre-wrap;">' + error.stack + '</pre></details>' : '') +
              '</div>' +
              '<p>Please check the browser console (F12) for more details.</p>' +
              '<button onclick="location.reload()" style="background: #ff4444; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 10px;">REBOOT SYSTEM</button>' +
              '</div>';
          }
          return false;
        };
        
        window.onunhandledrejection = function(event) {
          const reason = event.reason;
          const message = reason instanceof Error ? reason.message : String(reason);
          console.error("[UNHANDLED REJECTION]", reason);
          updateStatus("PROMISE REJECTION: " + message);
          
          var root = document.getElementById('root');
          if (root) {
            root.innerHTML = '<div style="color: #ff4444; padding: 40px; background: #1a0000; font-family: monospace; min-height: 100vh; box-sizing: border-box; border: 4px solid #ff0000;">' +
              '<h1>UNHANDLED ASYNC ERROR</h1>' +
              '<div style="background: #000; padding: 20px; border: 1px solid #ff4444;">' +
              '<p>' + (reason && reason.stack ? reason.stack : message) + '</p>' +
              '</div>' +
              '<button onclick="location.reload()" style="background: #ff4444; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 20px;">REBOOT SYSTEM</button>' +
              '</div>';
          }
        };
        
        window.updateStatus = updateStatus;
      })();
    </script>
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
</html>
