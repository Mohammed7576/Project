<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #050505; color: #10b981; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: monospace; flex-direction: column; gap: 20px;">
        <div style="border: 2px solid #10b981; padding: 20px; border-radius: 8px; animation: pulse 2s infinite;">
          [ جاري تحميل النظام... ]
        </div>
        <div style="font-size: 10px; opacity: 0.5;">
          INITIALIZING CYBER-CORE v0.0.0
        </div>
      </div>
    </div>
    <style>
      @keyframes pulse {
        0% { opacity: 0.5; }
        50% { opacity: 1; }
        100% { opacity: 0.5; }
      }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color: white; padding: 20px; background: #900; font-family: monospace;">' +
            '<h1>Global Error</h1>' +
            '<p>' + msg + '</p>' +
            '<p>at ' + url + ':' + line + ':' + col + '</p>' +
            '</div>';
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="color: white; padding: 20px; background: #900; font-family: monospace;">' +
            '<h1>Unhandled Rejection</h1>' +
            '<p>' + event.reason + '</p>' +
            '</div>';
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
